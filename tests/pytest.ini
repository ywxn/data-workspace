[pytest]
# Pytest configuration file for AI Data Workspace test suite

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Add current directory to path
pythonpath = .

# Output options
addopts =
    # Verbose output
    -v
    --tb=short
    
    # Show local variables in tracebacks
    --showlocals
    
    # Show summary info for all test outcomes
    -ra
    
    # Display percentage progress
    --color=yes
    
    # Generate HTML report
    --html=reports/test_report.html
    --self-contained-html
    
    # Enable strict markers
    --strict-markers
    
    # Show the slowest 10 tests
    --durations=10
    
    # Coverage options (if pytest-cov installed)
    --cov=.
    --cov-report=html:reports/coverage
    --cov-report=term-missing
    --cov-config=.coveragerc

# Test markers
markers =
    unit: Unit tests that test individual functions/classes
    integration: Integration tests that test multiple components together
    slow: Tests that take significant time to run
    requires_api: Tests that require API keys or external services
    requires_db: Tests that require a running database
    smoke: Quick smoke tests for basic functionality
    regression: Tests for fixed bugs
    stress: Stress/load tests
    
# Timeout for tests (seconds) - requires pytest-timeout
timeout = 300

# Ignore certain warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Test paths - where to look for tests
testpaths =
    tests

# Ignore these directories/files
norecursedirs =
    .git
    .venv
    __pycache__
    *.egg-info
    .pytest_cache
    build
    dist

# Doctest options
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = reports/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Coverage options
[coverage:run]
branch = True
source = .
omit =
    */tests/*
    */test_*.py
    setup.py
    */venv/*
    */virtualenv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
