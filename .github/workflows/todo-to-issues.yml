name: TODO to Issues

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  todo-to-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create issues from TODOs
        uses: alstr/todo-to-issue-action@v5.1.14
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          comment-marker: "TODO"
          escape: true
          auto-p: true
          projects: false
