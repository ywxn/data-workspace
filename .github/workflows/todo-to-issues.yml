name: TODO to Issues

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      MANUAL_COMMIT_REF:
        description: "The SHA of the commit to get the diff for"
        required: true
      MANUAL_BASE_REF:
        description: "Compare to an earlier commit SHA (optional)"
        required: false

jobs:
  todo-to-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create issues from TODOs
        id: todo
        uses: alstr/todo-to-issue-action@v5.1.14
        with:
          AUTO_P: true
          ESCAPE: true
          CLOSE_ISSUES: false      # prevent auto-closing while testing
          INSERT_ISSUE_URLS: true
        env:
          MANUAL_COMMIT_REF: ${{ inputs.MANUAL_COMMIT_REF }}
          MANUAL_BASE_REF: ${{ inputs.MANUAL_BASE_REF }}

      - name: Set Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push new issue URL changes
        run: |
          # Only commit if new issue URLs were inserted
          if [[ $(git status --porcelain) ]]; then
            echo "New issue URLs inserted, committing..."
            git add -A
            git commit -m "Automatically added GitHub issue links to TODOs"
            git push origin main
          else
            echo "No new issue URLs to commit"
          fi